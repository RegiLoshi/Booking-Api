services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: booking-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Regi1234!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Regi1234!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: booking-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "1"

  bookingapp:
    build:
      context: .
      dockerfile: BookingApp/Dockerfile
    container_name: booking-app
    depends_on:
      sqlserver:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BookingDb;User Id=sa;Password=Regi1234!;TrustServerCertificate=True;"
      JwtConfig__SecretKey: "k8Tz3Qm9XpLwR2vYnJcFhBdA6sE4uG7iWoNxMaCbVeHfKjPqUrStDlOyZgI1m5n0"
      JwtConfig__Lifetime: "3600"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__Topic: "user.login.succeeded"
      Kafka__ProducerEnabled: "true"
      Database__RunMigrationsOnStartup: "true"
      SendGrid__ApiKey: "${SENDGRID_API_KEY}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL}"
      SendGrid__FromName: "${SENDGRID_FROM_NAME:-BookingApi}"
    ports:
      - "8080:8080"

  loginlogapp:
    build:
      context: .
      dockerfile: LoginLogApp/Dockerfile
    container_name: login-log-app
    depends_on:
      sqlserver:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=LoginLogDb;User Id=sa;Password=Regi1234!;TrustServerCertificate=True;"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__Topic: "user.login.succeeded"
      Kafka__ConsumerGroupId: "login-log-consumer"
      Database__InitializeOnStartup: "true"
    ports:
      - "8081:8080"
